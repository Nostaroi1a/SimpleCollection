name: Build data.lua and Release Addon

on:
  schedule:
    - cron: "0 0 2,16 * *"   # roughly every two weeks (2nd and 16th, 00:00 UTC)
  workflow_dispatch:
    inputs:
      force:
        description: "Create a release even if the data is unchanged"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Tags are needed to compute the next release version
          fetch-tags: true

      - name: Download mounts.json
        run: curl --fail -sL https://raw.githubusercontent.com/kevinclement/SimpleArmory/master/static/data/mounts.json -o mounts.json

      # Converting at build time also validates the JSON: the job fails on bad data
      - name: Convert JSON to Lua table
        run: python3 tools/json2lua.py mounts.json data/data.lua

      - name: Detect data changes
        id: diff
        run: |
          if git diff --quiet -- data/data.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version
        id: version
        if: steps.diff.outputs.changed == 'true' || inputs.force
        run: |
          # Increment the patch number of the latest v1.1.x tag; falls back to 1.1.0
          latest=$(git tag --list "v1.1.*" --sort=-v:refname | head -n 1)
          patch="${latest##*.}"
          echo "version=1.1.$(( ${patch:--1} + 1 ))" >> "$GITHUB_OUTPUT"

      - name: Stamp addon version
        if: steps.diff.outputs.changed == 'true' || inputs.force
        run: |
          sed -i "s/^## Version:.*/## Version: ${{ steps.version.outputs.version }}/" SimpleCollection.toc

      - name: Commit, tag and push
        if: steps.diff.outputs.changed == 'true' || inputs.force
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.lua SimpleCollection.toc
          git commit -m "Update mount data from SimpleArmory"
          # Tag AFTER the data commit so CurseForge/Wago package the fresh data
          git tag v${{ steps.version.outputs.version }}
          git push origin HEAD --tags

      - name: Zip addon
        if: steps.diff.outputs.changed == 'true' || inputs.force
        run: zip -r SimpleCollection.zip . -x ".git/*" -x ".github/*" -x "tools/*" -x "mounts.json"

      - name: Create GitHub release
        if: steps.diff.outputs.changed == 'true' || inputs.force
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "SimpleCollection v${{ steps.version.outputs.version }}"
          files: SimpleCollection.zip
